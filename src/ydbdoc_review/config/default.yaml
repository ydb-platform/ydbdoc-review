# ydbdoc-review default configuration
# Override via env vars: YDBDOC_<SECTION>_<KEY> with dots → underscores.
# Examples:
#   YDBDOC_LLM_MODELS_TRANSLATE_PRIMARY=deepseek-v32
#   YDBDOC_LLM_TEMPERATURE=0.2
#   YDBDOC_TRANSLATION_SEGMENTS_PER_BATCH_CHARS=2000
#
# Secrets (folder_id, api_key, github tokens) come ONLY from env, never YAML.

llm:
  provider: yandex
  base_url: https://ai.api.cloud.yandex.net/v1

  temperature: 0.1
  max_tokens: 8000
  timeout_s: 120

  retries:
    max_attempts: 3
    backoff_initial_s: 2.0
    backoff_factor: 2.0
    rate_limit:
      max_attempts: 6
      backoff_initial_s: 5.0
      backoff_factor: 2.0
      max_backoff_s: 120.0

  concurrency:
    batches_per_file: 3

  # Translate and critic chains must be disjoint (§6.127) — never the same model
  # for both roles, including after fallback.
  models:
    analyze:
      primary: yandexgpt-5-lite
      fallbacks:
        - yandexgpt-5.1
    translate:
      primary: deepseek-v32
      fallbacks:
        - yandexgpt-5-pro
    critic:
      primary: yandexgpt-5.1
      fallbacks:
        - yandexgpt-5-lite

  eliza:
    translate:
      primary: deepseek-v4-flash
      fallbacks: []
    critic:
      primary: gpt-oss-120b
      fallbacks: []

translation:
  source_lang: ru
  target_lang: en
  segments_per_batch_chars: 4000
  critic_feedback_retries: 2
  # §6.132 — translate only changed RU segments when EN exists
  differential_enabled: true
  differential_stale_days: 90
  differential_change_magnitude: 0.5
  differential_min_en_ratio: 0.3
  continue_feedback: ""

ops:
  daily_budget_rub: 5000
  max_continues_per_pr: 3
  transcript_backend: ydb
  transcript_ttl_days: 14
  ydb_endpoint: grpcs://ydb.serverless.yandexcloud.net:2135
  ydb_database: /ru-central1/b1g7gqj2vnq67gjseuva/etns0641qf73btm7j21k
  allowed_actors: ""
  skip_gates: false

prompts:
  version: v1
  glossary_path: prompts/glossary.yaml

paths:
  docs_root: ydb/docs
  translation_branch_prefix: ydbdoc-review/pr-

reporting:
  include_cost: true
  include_token_usage: true
  include_heuristics: true
  include_skipped_critic: true

