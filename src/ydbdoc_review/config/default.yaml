# ydbdoc-review default configuration
# Override via env vars: YDBDOC_<SECTION>_<KEY> with dots → underscores.
# Examples:
#   YDBDOC_LLM_MODELS_TRANSLATE_PRIMARY=deepseek-v32
#   YDBDOC_LLM_TEMPERATURE=0.2
#   YDBDOC_TRANSLATION_SEGMENTS_PER_BATCH_CHARS=2000
#
# Secrets (folder_id, api_key, github tokens) come ONLY from env, never YAML.

llm:
  provider: yandex
  base_url: https://ai.api.cloud.yandex.net/v1

  temperature: 0.1
  max_tokens: 8000
  timeout_s: 120

  retries:
    max_attempts: 3
    backoff_initial_s: 2.0
    backoff_factor: 2.0

  concurrency:
    batches_per_file: 3

  models:
    analyze:
      primary: yandexgpt-5-lite
      fallbacks:
        - yandexgpt-5.1
    translate:
      primary: deepseek-v32
      fallbacks:
        - yandexgpt-5.1
        - yandexgpt-5-pro
    critic:
      primary: deepseek-v32
      fallbacks:
        - yandexgpt-5.1
        - yandexgpt-5-pro

translation:
  source_lang: ru
  target_lang: en
  segments_per_batch_chars: 4000

prompts:
  version: v1
  glossary_path: prompts/glossary.yaml

paths:
  docs_root: ydb/docs
  translation_branch_prefix: ydbdoc-review/pr-

reporting:
  include_cost: true
  include_token_usage: true
  include_heuristics: true

