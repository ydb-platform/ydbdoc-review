# Bundled defaults (override: ydbdoc-review.toml в cwd / YDBDOC_CONFIG).
# Slugs: для Yandex FM без префикса gpt:// — см. list-models; для OpenAI — например gpt-4o-mini.
# Полный URI gpt://… в TOML задаётся как есть (каталог в URI не добавляется повторно).

[models]
check = "yandexgpt/latest"
# deepseek-v32: только на ветке main (лимит 32k completion); в @v0.1.0 — yandexgpt-5.1
translate = "yandexgpt-5.1"
# Вторая модель для отладочной проверки перевода (см. [feature].translation_self_check).
# Не задавать или пусто — используется та же, что и check.
translation_verify = "yandexgpt-5.1"

# Быстрый выключатель в CI: надёжнее дублировать env YDBDOC_REVIEW_ENABLED=false в workflow.
[feature]
review_enabled = true
# Отладка: после перевода вызвать translation_verify и дописать отчёт в комментарий к исходному PR.
translation_self_check = true
