# Bundled defaults (override: ydbdoc-review.toml в cwd / YDBDOC_CONFIG).
# Slugs: для Yandex FM без префикса gpt:// — см. list-models; для OpenAI — например gpt-4o-mini.

[models]
# Дешёвая модель для analyze-фазы (alignment check), а также для translate-фолбэков.
check = "yandexgpt/latest"
# Переводчик: mask→translate→unmask и re-validate после fix-diff.
translate = "yandexgpt-5.1"
# Критик: сравнивает RU↔EN и (при «НЕ ПРИНИМАТЬ») возвращает fix-diff. ОБЯЗАТЕЛЬНО другая
# семья моделей, не та же что translate — иначе критик/исправитель не отловят свои ошибки.
# Фолбэки: см. YDBDOC_MODEL_VERIFY_FALLBACKS (по умолчанию тоже non-Yandex).
translation_verify = "qwen3.6-35b-a3b"

# Optional translation context (paths relative to prompts_dir or absolute).
# Env overrides: YDBDOC_GLOSSARY_PATH, YDBDOC_PROJECT_INFO_PATH, …
[prompts]
# glossary = "glossary.md"
# project_info = "project_info.md"

[feature]
review_enabled = true
# critic compare + heuristics; результат — комментарий в translation PR. Коммит всегда.
translation_self_check = true
# При «НЕ ПРИНИМАТЬ» — fix-diff от критика + re-validate переводчиком.
translation_repair = true
