# Verify translation PR: label doc_verify on branch ydbdoc-review/pr-N (or bilingual PR).

name: ydbdoc-review (doc_verify label)

on:
  pull_request_target:
    types: [labeled]
    paths:
      - "ydb/docs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  ydbdoc-verify:
    if: github.event.label.name == 'doc_verify'
    runs-on: ubuntu-latest
    concurrency:
      group: ydbdoc-verify-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch merge base ref
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Verify translation on PR branch (v2)
        uses: ydb-platform/ydbdoc-review@v0.1.0
        with:
          mode: verify
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          merge_base_with: origin/${{ github.event.pull_request.base.ref }}
          # no_commit: "true"
        env:
          YDBDOC_YC_FOLDER_ID: ${{ secrets.YANDEX_CLOUD_FOLDER_DOC_REVIEW }}
          YDBDOC_YC_API_KEY: ${{ secrets.YANDEX_CLOUD_API_KEY_DOC_REVIEW }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PUSH_TOKEN: ${{ secrets.YDBDOC_PUSH_PAT }}
          YDBDOC_REPO_PATH: ${{ github.workspace }}
