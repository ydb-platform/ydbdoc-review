# Пример для репозитория ydb: .github/workflows/ydbdoc-review.yml
# Запуск по лейблу doc_translate на PR с изменениями ydb/docs/**
#
# doc_translate — перевод + translation PR + inline doc_verify (QA-отчёт в том же job).
# Лейбл doc_verify на translation PR — только для ручного перезапуска (ydbdoc-verify.yml).
#
# YDBOT_TOKEN — только в trigger-translation-ci (без checkout): ok-to-test + rebuild_docs.

name: ydbdoc-review (doc_translate label)

on:
  pull_request_target:
    types: [labeled]
    paths:
      - "ydb/docs/**"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ydbdoc-review:
    if: github.event.label.name == 'doc_translate'
    runs-on: ubuntu-latest
    concurrency:
      group: ydbdoc-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout translation source
        uses: actions/checkout@v5
        with:
          # Merged PRs: merge commit (landed tree). Open PRs: feature head.
          # Stale head after squash can regress EN vs main (YFM010, §6.120).
          ref: ${{ github.event.pull_request.merged && github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch merge base ref
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Documentation translation
        uses: ydb-platform/ydbdoc-review@v0.1.0
        with:
          repo: ${{ github.repository }}
          pr: ${{ github.event.pull_request.number }}
          merge_base_with: origin/${{ github.event.pull_request.base.ref }}
          # dry_run: "true"
          # no_commit: "true"
        env:
          YANDEX_CLOUD_FOLDER_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_FOLDER_DOC_REVIEW }}
          YANDEX_CLOUD_API_KEY_DOC_REVIEW: ${{ secrets.YANDEX_CLOUD_API_KEY_DOC_REVIEW }}
          GITHUB_TOKEN: ${{ github.token }}
          YDBDOC_REPO_PATH: ${{ github.workspace }}
          GITHUB_ACTOR: ${{ github.event.sender.login }}
          YDBDOC_ALLOWED_ACTORS: ${{ vars.YDBDOC_ALLOWED_ACTORS }}
          YDBDOC_DAILY_BUDGET_RUB: ${{ vars.YDBDOC_DAILY_BUDGET_RUB }}
          YDBDOC_TRANSCRIPT_BACKEND: ydb
          YDB_SA_KEY: ${{ secrets.YDB_SA_KEY }}

  trigger-translation-ci:
    needs: ydbdoc-review
    if: ${{ !cancelled() && needs.ydbdoc-review.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PR-check and docs rebuild on translation PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.YDBOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourcePr = context.payload.pull_request.number;
            const head = `${owner}:ydbdoc-review/pr-${sourcePr}`;
            let translationPr = null;

            for (let attempt = 1; attempt <= 6; attempt++) {
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head,
                per_page: 1,
              });

              if (pulls[0]) {
                translationPr = pulls[0];
                break;
              }

              if (attempt < 6) {
                core.info(`Translation PR not found yet (${attempt}/6), retrying...`);
                await new Promise((resolve) => setTimeout(resolve, 5000));
              }
            }

            if (!translationPr) {
              core.warning(
                `Open translation PR not found for head ${head}. Labels were not added; CI can be triggered manually.`
              );
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: translationPr.number,
              labels: ['rebuild_docs', 'ok-to-test'],
            });

            core.info(
              `Added rebuild_docs and ok-to-test to translation PR #${translationPr.number}`
            );
