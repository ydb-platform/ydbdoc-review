# Build and push the action image to GHCR so consumer workflows do not pull
# python:3.12-slim from Docker Hub on every doc_translate run.
name: Publish action image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            YDBDOC_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/ydb-platform/ydbdoc-review:${{ github.ref_name }}
            ghcr.io/ydb-platform/ydbdoc-review:${{ github.sha }}
