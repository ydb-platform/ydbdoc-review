# Optional GHCR fallback image (see action-docker.sh). Not required for every
# bugfix — consumer workflows build Dockerfile locally first.
name: Publish action image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            YDBDOC_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/ydb-platform/ydbdoc-review:${{ github.ref_name }}
            ghcr.io/ydb-platform/ydbdoc-review:${{ github.sha }}
